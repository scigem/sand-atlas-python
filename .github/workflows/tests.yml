name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  pytest:
    name: Pytest and Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . --no-deps
          pip install pytest pytest-cov numpy pandas scikit-image tifffile pynrrd h5py requests scipy tqdm colorama matplotlib progressbar2

      - name: Run test suite with coverage gate
        run: |
          pytest tests --cov=sand_atlas --cov-report=term-missing --cov-report=xml

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
            token: ${{ secrets.CODECOV_TOKEN }}
            slug: scigem/sand-atlas-python

      - name: Upload coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml